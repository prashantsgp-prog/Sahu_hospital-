<div class="card" id="conviction-shield">
    <div class="section-title" style="color: var(--gold);">
        <i class="fa-solid fa-gavel"></i> Conviction Shield: एआई लीगल एविडेंस ऑडिटर
    </div>
    <p style="margin-bottom: 15px; color: #cbd5e1;">विवेचना पूर्ण होने से पूर्व अपनी चार्जशीट/फाइल का ऑडिट करें। AI उन तकनीकी खामियों को खोजेगा जो कोर्ट में केस को कमजोर कर सकती हैं।</p>

    <textarea id="charge-sheet-input" placeholder="चार्जशीट/केस डायरी का मुख्य अंश यहाँ पेस्ट करें... (उदा: घटना का समय, गवाहों के नाम, फॉरेंसिक रिपोर्ट की स्थिति आदि)"></textarea>
    
    <button class="btn btn-gold" onclick="runLegalAudit()" style="width: 100%; margin-top: 10px; font-size: 1.1rem;">
        <i class="fa-solid fa-microchip"></i> केस ऑडिट शुरू करें
    </button>

    <div id="audit-results" style="display: none; margin-top: 25px; border-top: 2px solid var(--gold); padding-top: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="color: var(--accent-blue);">ऑडिट रिपोर्ट</h3>
            <div id="conviction-score-badge" style="padding: 5px 15px; border-radius: 20px; font-weight: bold;">Score: 0%</div>
        </div>

        <div class="grid-stats" style="grid-template-columns: 1fr 1fr;">
            <div class="card" style="background: rgba(0,0,0,0.3);">
                <h4 style="color: #00ff88;">✅ मजबूत पक्ष (Strengths)</h4>
                <ul id="audit-strengths" style="padding-left: 20px; margin-top: 10px;"></ul>
            </div>
            <div class="card" style="background: rgba(0,0,0,0.3);">
                <h4 style="color: #ff3366;">⚠️ सुधार हेतु (Critical Gaps)</h4>
                <ul id="audit-gaps" style="padding-left: 20px; margin-top: 10px;"></ul>
            </div>
        </div>
    </div>
</div>

<script>
function runLegalAudit() {
    const text = document.getElementById('charge-sheet-input').value.toLowerCase();
    const resultPanel = document.getElementById('audit-results');
    const strengthList = document.getElementById('audit-strengths');
    const gapsList = document.getElementById('audit-gaps');
    
    if(!text) return alert("कृपया विश्लेषण के लिए केस विवरण दर्ज करें।");

    resultPanel.style.display = 'block';
    strengthList.innerHTML = '';
    gapsList.innerHTML = '';
    
    let score = 50; // Starting score
    let gaps = [];
    let strengths = [];

    // Logic: Checking for mandatory legal evidence
    if(text.includes("गवाह") || text.includes("witness")) { strengths.push("गवाहों के बयान दर्ज हैं"); score += 20; }
    else { gaps.push("चश्मदीद गवाहों का उल्लेख नहीं है"); score -= 20; }

    if(text.includes("फॉरेंसिक") || text.includes("fsl") || text.includes("medical")) { strengths.push("फॉरेंसिक/मेडिकल साक्ष्य मौजूद"); score += 20; }
    else { gaps.push("फॉरेंसिक रिपोर्ट/मेडिकल साक्ष्य गायब हैं"); score -= 20; }

    if(text.includes("तारीख") || text.includes("समय") || text.includes("time")) { strengths.push("घटना का समय-क्रम स्पष्ट है"); score += 10; }
    else { gaps.push("घटना का कालक्रम (Timeline) अस्पष्ट है"); score -= 10; }

    // Render results
    strengthList.innerHTML = strengths.map(s => `<li>${s}</li>`).join('');
    gapsList.innerHTML = gaps.map(g => `<li>${g}</li>`).join('');
    
    const badge = document.getElementById('conviction-score-badge');
    badge.innerText = `Conviction Potential: ${score}%`;
    badge.style.backgroundColor = score > 70 ? '#004400' : '#440000';
    badge.style.color = score > 70 ? '#00ff88' : '#ff4444';
}
</script>
